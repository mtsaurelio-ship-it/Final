name: Build APK Capacitor - Definitivo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Instalar Node.js 22
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Instalar dependências NPM
      - name: Instalar dependências
        run: |
          npm install --force --legacy-peer-deps

      # 4. Build web
      - name: Build Web
        run: |
          npm run build
          if [ -d "./dist" ]; then
            echo "WEB_DIR=dist" >> $GITHUB_ENV
          elif [ -d "./build" ]; then
            echo "WEB_DIR=build" >> $GITHUB_ENV
          else
            echo "Nenhuma pasta de build web encontrada. Verifique seu npm run build"
            exit 1
          fi

      # 5. Sincronizar Capacitor com Android
      - name: Sincronizar Capacitor
        run: npx cap sync android

      # 6. Configurar Java 17
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 7. Tornar gradlew executável
      - name: Tornar gradlew executável
        run: chmod +x android/gradlew

      # 8. Atualizar Gradle Wrapper para 8.13
      - name: Atualizar Gradle Wrapper
        run: |
          cd android
          ./gradlew wrapper --gradle-version 8.13 --distribution-type all

      # 9. Forçar Java 17 no gradle.properties do wrapper
      - name: Forçar Java 17 no Gradle Wrapper
        run: |
          cd android
          echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      # 10. Limpar Gradle
      - name: Limpar Gradle
        run: |
          cd android
          ./gradlew clean

      # 11. Forçar Java 17 em todos os build.gradle
      - name: Forçar Java 17 em todos os módulos
        run: |
          cd android
          find . -name "build.gradle" -type f | while read file; do
            sed -i 's/sourceCompatibility = .*/sourceCompatibility = JavaVersion.VERSION_17/' "$file" || true
            sed -i 's/targetCompatibility = .*/targetCompatibility = JavaVersion.VERSION_17/' "$file" || true
            sed -i 's/jvmTarget = .*/jvmTarget = "17"/' "$file" || true
          done

      # 12. Compilar APK
      - name: Compilar APK
        run: |
          cd android
          ./gradlew assembleDebug

      # 13. Upload do APK como artefato
      - name: Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-final
          path: android/app/build/outputs/apk/debug/app-debug.apk
