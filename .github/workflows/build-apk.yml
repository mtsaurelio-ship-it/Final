name: Build APK Capacitor

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Instalar Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 3. Instalar Dependências
        run: |
          npm install --force --legacy-peer-deps  # Instala dependências ignorando conflitos de peer dependencies

      - name: 4. Sincronizar Capacitor com Android
        run: |
          npx cap sync android  # Sincroniza plugins e plataforma Android

      - name: 5. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 6. Limpar o cache do Gradle
        run: |
          cd android
          ./gradlew clean

      - name: 7. Tornar gradlew executável
        run: |
          chmod +x android/gradlew

      - name: 8. Configurar versão do Gradle
        run: |
          cd android
          ./gradlew wrapper --gradle-version 7.5 --distribution-type all

      - name: 9. Compilar APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 10. Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-final
          path: android/app/build/outputs/apk/debug/app-debug.apk
