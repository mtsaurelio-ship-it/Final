name: Build APK Capacitor

on:
  workflow_dispatch:  # Este evento permite que você execute o workflow manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4  # Faz o checkout do código do repositório

      - name: 2. Instalar Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22  # Instalar a versão do Node.js que você usa no seu projeto

      - name: 3. Instalar Dependências e Build Web
        run: |
          npm install --force  # Instala as dependências do seu projeto
          npm run build  # Faz o build do seu app (geralmente o build da sua aplicação web)

      - name: 4. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'  # Configura o Java 17, necessário para compilar o APK

      - name: 5. Recriar e Sincronizar a Plataforma Android
        run: |
          # Remove a pasta android se ela já existir e estiver com problemas
          rm -rf android
          
          # Adiciona novamente a plataforma Android
          npx cap add android
          
          # Sincroniza as mudanças do Capacitor com a plataforma Android
          npx cap sync android

      - name: 6. Tornar gradlew Executável
        run: |
          chmod +x android/gradlew  # Garante que o script gradlew seja executável

      - name: 7. Compilar APK (Usando gradlew)
        run: |
          cd android
          ./gradlew assembleDebug  # Compila o APK usando o gradle wrapper

      - name: 8. Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-final
          path: android/app/build/outputs/apk/debug/app-debug.apk  # Caminho do APK gerado
