name: Build APK Capacitor

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Instalar Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 3. Instalar Dependências
        run: |
          npm install --force --legacy-peer-deps

      - name: 4. Build Web
        run: |
          npm run build

      - name: 5. Sincronizar Capacitor com Android
        run: |
          npx cap sync android

      - name: 6. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 7. Limpar cache do Gradle
        run: |
          cd android
          ./gradlew clean

      - name: 8. Tornar gradlew executável
        run: |
          chmod +x android/gradlew

      - name: 9. Atualizar Gradle Wrapper para 8.13
        run: |
          cd android
          ./gradlew wrapper --gradle-version 8.13 --distribution-type all

      - name: 10. Ajustar Java Compatibility no Gradle
        run: |
          cd android
          # Garante que compileOptions use Java 17
          sed -i 's/sourceCompatibility = .*/sourceCompatibility = JavaVersion.VERSION_17/' app/build.gradle
          sed -i 's/targetCompatibility = .*/targetCompatibility = JavaVersion.VERSION_17/' app/build.gradle
          sed -i 's/jvmTarget = .*/jvmTarget = "17"/' app/build.gradle || true

      - name: 11. Compilar APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 12. Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-final
          path: android/app/build/outputs/apk/debug/app-debug.apk
