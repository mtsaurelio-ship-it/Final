name: Gerar APK Capacitor Ultra-Estavel
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Instalar Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 3. Instalar Dependências e Build Web
        run: |
          npm install --force
          npm run build

      - name: 4. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 5. Garantir Pasta Android e Sincronizar
        run: |
          # Se a pasta android não existir no GitHub, o robô cria ela agora
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: 6. Configurar Gradle (Ação Oficial)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2.1

      - name: 7. Gerar Wrapper e Corrigir Permissões
        run: |
          cd android
          gradle wrapper --gradle-version 8.2.1
          chmod +x gradlew

      - name: 8. Compilar APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 9. Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: app-final-construido
          path: android/app/build/outputs/apk/debug/app-debug.apk
