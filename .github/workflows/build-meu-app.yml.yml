name: Gerar APK Capacitor - Solucao Definitiva v5
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Instalar Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 3. Instalar Dependências e Build Web
        run: |
          npm install --force
          npm run build

      - name: 4. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 5. Instalar Gradle no Sistema
        run: |
          sudo apt-get update
          sudo apt-get install gradle -y

      - name: 6. Recriar Pasta Android e Sincronizar
        run: |
          # Remove a pasta android se ela estiver incompleta ou com erro
          rm -rf android
          
          # Adiciona a plataforma do zero
          npx cap add android
          
          # Sincroniza os arquivos do site
          npx cap sync android

      - name: 7. Compilar APK (Usando Gradle do Sistema)
        run: |
          cd android
          # Em vez de ./gradlew, usamos o gradle do sistema que instalamos no passo 5
          gradle assembleDebug

      - name: 8. Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-final
          path: android/app/build/outputs/apk/debug/app-debug.apk
