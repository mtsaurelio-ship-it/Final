name: Gerar APK Capacitor - Solucao Definitiva
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Instalar Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 3. Instalar Dependências e Build Web
        run: |
          npm install --force
          npm run build

      - name: 4. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 5. Instalar Gradle no Sistema
        run: |
          sudo apt-get update
          sudo apt-get install gradle -y

      - name: 6. Preparar Android e Gerar Executaveis
        run: |
          # Adiciona a pasta android se ela não existir
          if [ ! -d "android" ]; then
            npx cap add android
          fi

          # Sincroniza o código do site com o projeto Android
          npx cap sync android

          # Entra na pasta android e força a criação do wrapper
          cd android
          gradle wrapper --gradle-version 8.2.1
          
          # Verifica se o arquivo foi criado, se não, tenta criar de novo
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          
          # Garante a permissão de execução
          chmod +x gradlew
          echo "Conteudo da pasta android:"
          ls -F

      - name: 7. Compilar APK (Debug)
        working-directory: ./android
        run: |
          ./gradlew assembleDebug

      - name: 8. Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-sucesso
          path: android/app/build/outputs/apk/debug/app-debug.apk
