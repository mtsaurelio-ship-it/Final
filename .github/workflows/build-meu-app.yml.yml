name: Gerar APK Capacitor - Correcao Final
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Instalar Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 3. Instalar Dependências e Build Web
        run: |
          npm install --force
          npm run build

      - name: 4. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 5. Instalar Gradle (Necessário para criar o Wrapper)
        run: |
          sudo apt-get update
          sudo apt-get install gradle -y

      - name: 6. Configurar Pasta Android e Gerar Wrapper
        run: |
          # Adiciona a plataforma se não existir
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          # Sincroniza os arquivos do site com o Android
          npx cap sync android
          
          # ENTRA na pasta e FORÇA a criação do gradlew
          cd android
          gradle wrapper --gradle-version 8.2.1
          chmod +x gradlew
          ls -la  # Comando apenas para conferir no log se o arquivo apareceu

      - name: 7. Compilar APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 8. Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: app-final-sucesso
          path: android/app/build/outputs/apk/debug/app-debug.apk
